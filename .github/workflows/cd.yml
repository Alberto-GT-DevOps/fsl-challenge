name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-west-2

      - name: Login in ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
          | docker login \
          --username AWS \
          --password-stdin 045306125645.dkr.ecr.us-west-2.amazonaws.com/fsl-challenge

      - name: Build and push image
        working-directory: ./codebase/rdicidr-0.1.0
        run: |
          docker build -t 045306125645.dkr.ecr.us-west-2.amazonaws.com/fsl-challenge .
          docker push 045306125645.dkr.ecr.us-west-2.amazonaws.com/fsl-challenge

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster fsl-cluster \
            --service fsl-service \
            --force-new-deployment
